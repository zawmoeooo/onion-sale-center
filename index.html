<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onion Sale Center</title>
    <meta name="description" content="">
    <meta name="keywords" content="">
    <link id="favicon-link" rel="icon" type="image/png" href="">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Onion Sale Center">
    <meta property="og:description" content="Premium Wholesale & Retail Onion Supply">
    <meta property="og:image" content="">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-spinner" class="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <header class="main-header">
        <div class="header-container">
            <a href="#home" class="logo-area">
                <img id="header-logo" src="" alt="Business Logo" class="logo-img">
                <span id="header-title" class="brand-name"></span>
            </a>
            
            <nav class="navbar" id="main-nav">
                <ul class="nav-links" id="nav-links-container"></ul>
            </nav>

            <div class="header-actions">
                <select id="lang-select" class="lang-dropdown">
                    <option value="en">English</option>
                    <option value="my">မြန်မာ</option>
                </select>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="hamburger" id="hamburger-menu" aria-label="Toggle Menu">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section id="home" class="hero-section">
            <div class="carousel-container" id="hero-carousel"></div>
            
            <button class="slider-arrow prev-arrow" id="slider-prev" aria-label="Previous Slide">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="slider-arrow next-arrow" id="slider-next" aria-label="Next Slide">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
            <div class="slider-dots" id="slider-dots-container"></div>

            <div class="hero-overlay">
                <h1 id="hero-headline" class="reveal"></h1>
                <p id="hero-tagline" class="reveal delay-1"></p>
                <a href="#contact" id="hero-cta" class="btn btn-primary reveal delay-2"></a>
            </div>
        </section>

        <section id="about" class="about-section section-padding">
            <div class="container">
                <h2 id="about-title" class="section-title reveal"></h2>
                <div class="about-grid">
                    <div class="about-card reveal"><p id="about-desc"></p></div>
                    <div class="about-card reveal delay-1">
                        <h3 id="history-title"></h3>
                        <p id="about-history"></p>
                    </div>
                    <div class="about-card reveal delay-2">
                        <h3 id="mission-title"></h3>
                        <p id="about-mission"></p>
                    </div>
                </div>
                <div class="stats-grid" id="stats-container"></div>
            </div>
        </section>

        <section id="goals" class="goals-section section-padding bg-alt">
            <div class="container">
                <h2 id="goals-main-title" class="section-title reveal"></h2>
                <div class="cards-grid" id="goals-container"></div>
            </div>
        </section>

        <section id="products" class="products-section section-padding">
            <div class="container">
                <h2 id="services-main-title" class="section-title reveal"></h2>
                <div class="cards-grid" id="services-container"></div>
            </div>
        </section>

        <section id="gallery" class="gallery-section section-padding bg-alt">
            <div class="container">
                <h2 id="gallery-main-title" class="section-title reveal"></h2>
                <div class="gallery-grid" id="gallery-container"></div>
            </div>
        </section>

        <section id="whyUs" class="why-section section-padding">
            <div class="container">
                <h2 id="why-main-title" class="section-title reveal"></h2>
                <div class="why-grid" id="why-container"></div>
            </div>
        </section>

        <section id="contact" class="contact-section section-padding bg-alt">
            <div class="container">
                <h2 id="contact-main-title" class="section-title reveal"></h2>
                <div class="contact-wrapper">
                    <div class="contact-cards" id="contact-methods-container"></div>
                    <div class="contact-map reveal">
                        <h3 id="map-location-title" style="margin-bottom:1rem;"></h3>
                        <p id="address-text" style="margin-bottom:1.5rem; color:var(--text-muted);"></p>
                        <div class="map-responsive">
                            <iframe id="google-map-iframe" src="" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="gallery-lightbox" class="lightbox-modal" aria-hidden="true">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Enlarged gallery view">
    </div>

    <footer class="main-footer">
        <div class="container footer-container">
            <p>© <span id="footer-year"></span> <span id="footer-biz-name"></span>. All rights reserved.</p>
            <div class="footer-socials" id="footer-socials-container"></div>
        </div>
    </footer>

    <button id="back-to-top" class="back-top-btn" aria-label="Back to Top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
